<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8b4513" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#8b4513" />
    <meta name="msapplication-navbutton-color" content="#8b4513" />
    <title>Café Gourmet API</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f9f9f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; padding: 3rem 2rem; }
        .emoji { font-size: 48px; margin-bottom: 1rem; }
        h1 { font-size: 22px; font-weight: 500; color: #111; margin-bottom: 0.25rem; }
        .version { font-size: 14px; color: #888; margin-bottom: 2rem; }
        .links { display: flex; flex-direction: column; gap: 12px; width: 260px; margin: 0 auto; }
        a { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 12px 16px; background: #fff; border: 1px solid #e5e5e5; border-radius: 8px; text-decoration: none; color: #111; font-size: 14px; transition: background 0.15s; }
        a:hover { background: #f3f3f3; }
        a span { flex: 1; text-align: left; }
        a i { color: #aaa; }
        a i:first-child { color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">☕</div>
        <h1>Café Gourmet API</h1>
        <p class="version">v1.1.0</p>
        <div class="links">
            <a href="/api">
                <i class="bi bi-plug"></i>
                <span>API</span>
                <i class="bi bi-arrow-right"></i>
            </a>
            <a href="/api-docs">
                <i class="bi bi-journal-text"></i>
                <span>Documentação (Swagger)</span>
                <i class="bi bi-arrow-right"></i>
            </a>
            <a href="https://gourmet-coffee-front.vercel.app" target="_blank">
                <i class="bi bi-cup-hot"></i>
                <span>Aplicação</span>
                <i class="bi bi-box-arrow-up-right"></i>
            </a>
        </div>
    </div>
</body>
</html>
