name: Deploy Backend

on:
  push:
    branches:
      - main

# Garante que só um deploy roda por vez
concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: projetofinal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/projetofinal_test
      BLOB_READ_WRITE_TOKEN: fake_token_for_tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Seed admin user
        run: npx prisma db seed

      - name: Run tests
        run: npm test -- --passWithNoTests

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    needs: test # só faz deploy se os testes passarem

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: back/package-lock.json

      - name: Deploy to Vercel (action)
        uses: amondnet/vercel-action@v42
        id: vercel_deploy_back
        with:
          github-token: ${{ github.token }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_BACK }}
          vercel-build: true
          target: production
          github-deployment-environment: production
          github-deployment: true
          working-directory: ./back
