name: Deploy Frontend

on:
  push:
    branches:
      - main

# Garante que só um deploy roda por vez
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  test:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure router dependency is available
        run: npm ls react-router-dom || npm install react-router-dom@^6.30.3 --no-save

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  deploy:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      deployments: write

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_FRONT }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      # 1. Entramos na pasta para instalar as dependências localmente do front
      - name: Install dependencies
        run: cd front && npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # 2. O Pull precisa saber onde estão as configurações locais do projeto do front
      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --cwd front
        
      # 3. O Actions faz o build dentro da pasta correta
      - name: Build Project Artifacts locally
        run: cd front && npm run build

      # 4. O Deploy roda na RAIZ. Ele lê a pasta .vercel gerada na raiz/front e deixa
      # que a Vercel use o Root Directory "front" configurado no painel deles.
      - name: Deploy Project Artifacts to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes