name: Deploy Frontend

on:
  push:
    branches:
      - main

# Garante que só um deploy roda por vez
concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  test:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Ensure router dependency is available
        run: npm ls react-router-dom || npm install react-router-dom@^6.30.3 --no-save

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    needs: test # só faz deploy se os testes passarem

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Deploy to Vercel (action)
        uses: amondnet/vercel-action@v42
        id: vercel_deploy_front
        with:
          github-token: ${{ github.token }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_FRONT }}
          vercel-build: true
          target: production
          github-deployment-environment: production
          github-deployment: true
