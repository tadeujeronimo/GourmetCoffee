services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Node/Express + Prisma) ──────────────────────────────────────────
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      BLOB_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN:-}
      USE_LOCAL_STORAGE: "true"
    ports:
      - "4000:4000"
    # Roda migrations + seed antes de iniciar o servidor
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]

  # ── Frontend (React) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:4000
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:4000
      # Permite o react-scripts escutar em todas as interfaces dentro do container
      HOST: "0.0.0.0"
      # Desabilita abertura automática do browser
      BROWSER: none
      # Necessário para react-scripts rodar sem interatividade
      CI: "false"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"

volumes:
  postgres_data:
